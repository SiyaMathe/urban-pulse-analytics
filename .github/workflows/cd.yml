name: CD — Deploy to Azure

on:
  push:
    branches: ["main"]
  workflow_dispatch:      # Allow manual triggers

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'backend/functions'
  AZURE_WEBAPP_PACKAGE_PATH: 'backend/api'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Deploy Azure Infrastructure via Bicep (IaC)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-infrastructure:
    name: Deploy Infrastructure (Bicep)
    runs-on: ubuntu-latest
    environment: production
    outputs:
      functionapp-name: ${{ steps.deploy.outputs.functionappName }}
      webapp-name:      ${{ steps.deploy.outputs.webappName }}
      sql-server-name:  ${{ steps.deploy.outputs.sqlServerName }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infrastructure/main.bicep
          parameters: >
            environment=production
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
          failOnStdErr: false

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Run Database Migrations
  # ─────────────────────────────────────────────────────────────────────────
  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install sqlcmd
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev

      - name: Run schema migrations (idempotent)
        env:
          SQL_CONNECTION: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          for f in backend/sql/migrations/V*.sql; do
            echo "Running migration: $f"
            /opt/mssql-tools/bin/sqlcmd \
              -S "${{ secrets.SQL_SERVER }}" \
              -U "${{ secrets.SQL_ADMIN_USER }}" \
              -P "${{ secrets.SQL_ADMIN_PASSWORD }}" \
              -d "UrbanPulseAnalytics" \
              -i "$f" \
              -b    # Exit on error
          done

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Build & Deploy Azure Functions
  # ─────────────────────────────────────────────────────────────────────────
  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, run-migrations]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Functions
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/UrbanPulse.Functions.csproj \
            --configuration Release \
            --output ./functions-publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: './functions-publish'

      - name: Configure Function App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          app-settings-json: |
            [
              {
                "name": "AZURE_SQL_CONNECTION_STRING",
                "value": "${{ secrets.AZURE_SQL_CONNECTION_STRING }}",
                "slotSetting": false
              },
              {
                "name": "AZURE_STORAGE_CONNECTION_STRING",
                "value": "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}",
                "slotSetting": false
              },
              {
                "name": "APPINSIGHTS_INSTRUMENTATIONKEY",
                "value": "${{ secrets.APPINSIGHTS_KEY }}",
                "slotSetting": false
              }
            ]

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Build & Deploy REST API (Azure App Service)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy REST API
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, run-migrations]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build API
        run: |
          dotnet publish ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/UrbanPulse.Api.csproj \
            --configuration Release \
            --output ./api-publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: './api-publish'

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Build & Deploy Frontend (Azure Static Web Apps)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: deploy-api
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist

  # ─────────────────────────────────────────────────────────────────────────
  # Job 6: Smoke tests post-deployment
  # ─────────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-functions, deploy-api, deploy-frontend]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Health check — Functions
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health")
          if [ "$response" != "200" ]; then
            echo "Functions health check failed: HTTP $response"
            exit 1
          fi
          echo "✅ Functions healthy"

      - name: Health check — API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health")
          if [ "$response" != "200" ]; then
            echo "API health check failed: HTTP $response"
            exit 1
          fi
          echo "✅ API healthy"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment to production completed successfully"
          echo "Functions: https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net"
          echo "API:       https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/swagger"
